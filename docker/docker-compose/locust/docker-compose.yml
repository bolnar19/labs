version: '3'

services:
  master:
    image: locustio/locust:2.42.5
    container_name: locust_master
    environment:
      - TZ=America/Bogota
    ports:
     - "8089:8089"
    volumes:
      - ./:/mnt/locust
    command: -f /mnt/locust/Script.py --master -H http://master:8089 #--web-host=0.0.0.0
  
  worker:
    image: locustio/locust:2.42.5
    container_name: locust_worker
    environment:
      - TZ=America/Bogota
    volumes:
      - ./:/mnt/locust
    command: -f /mnt/locust/Script.py --worker --master-host master --loglevel DEBUG --csv=full-history
